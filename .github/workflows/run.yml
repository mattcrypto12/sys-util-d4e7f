name: Scheduled Task

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          token: ${{ secrets.REPO_PAT }}

      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci || (sleep 15 && npm ci) || (sleep 30 && npm ci)

      - name: Execute
        env:
          V1: ${{ secrets.V1 }}
          V2: ${{ secrets.V2 }}
          V3: ${{ secrets.V3 }}
          V4: ${{ secrets.V4 }}
          V5: ${{ secrets.V5 }}
        run: npx --yes tsx scripts/cron-refresh.ts
