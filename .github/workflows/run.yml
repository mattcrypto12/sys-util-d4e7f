name: Scheduled Task

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          token: ${{ secrets.REPO_PAT }}

      - name: Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci || (sleep 15 && npm ci) || (sleep 30 && npm ci)

      - name: Execute
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.V1 }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.V2 }}
          ITAD_API_KEY: ${{ secrets.V3 }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.V4 }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.V5 }}
        run: npx tsx scripts/cron-refresh.ts
